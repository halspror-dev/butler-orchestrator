<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butler</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230d1117' rx='6'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='20' font-weight='700' fill='%232dd4bf' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { position: relative; flex-shrink: 0; text-align: center; padding: 14px 0 10px; border-bottom: 1px solid #21262d; }
    header h1 { color: #2dd4bf; font-family: 'Consolas', 'SF Mono', monospace; font-size: 1.35rem; font-weight: 600; letter-spacing: 6px; }
    header p { color: #6e7681; font-size: 0.72rem; margin-top: 3px; letter-spacing: 0.5px; }
    #mem-toggle { position: absolute; top: 12px; right: 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; font-size: 1.1rem; padding: 4px 10px; cursor: pointer; transition: border-color 0.15s; }
    #mem-toggle:hover { border-color: #2dd4bf; }
    #mem-drawer { position: fixed; top: 0; right: -340px; width: 320px; height: 100vh; background: #161b22; border-left: 1px solid #21262d; padding: 20px 18px; overflow-y: auto; transition: right 0.25s ease; z-index: 100; }
    #mem-drawer.open { right: 0; }
    #mem-drawer h2 { color: #2dd4bf; font-family: 'Consolas', monospace; font-size: 0.95rem; letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
    .mem-item { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; font-size: 0.82rem; line-height: 1.5; color: #e6edf3; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .mem-del { background: none; border: none; color: #6e7681; cursor: pointer; font-size: 0.95rem; flex-shrink: 0; transition: color 0.15s; }
    .mem-del:hover { color: #f85149; }
    .mem-empty { color: #6e7681; font-size: 0.82rem; font-style: italic; }
    #conv-wrapper { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    #conv-wrapper::-webkit-scrollbar { width: 6px; }
    #conv-wrapper::-webkit-scrollbar-track { background: transparent; }
    #conv-wrapper::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    #conversation { max-width: 800px; margin: 0 auto; padding: 24px 20px 12px; display: flex; flex-direction: column; gap: 14px; }
    .user-msg { align-self: flex-end; max-width: 72%; background: #1c2733; border: 1px solid rgba(45, 212, 191, 0.2); border-radius: 12px 12px 2px 12px; padding: 10px 14px; font-size: 0.9rem; line-height: 1.55; color: #e6edf3; }
    .butler-wrapper { align-self: flex-start; max-width: 78%; display: flex; flex-direction: column; gap: 5px; }
    .worker-tag { font-family: 'Consolas', 'SF Mono', monospace; font-size: 0.62rem; font-weight: 700; color: #2dd4bf; text-transform: uppercase; letter-spacing: 2px; padding-left: 14px; opacity: 0.85; }
    .butler-msg { background: #161b22; border-left: 2px solid #2dd4bf; border-radius: 0 12px 12px 0; padding: 10px 14px; font-size: 0.9rem; line-height: 1.65; color: #e6edf3; }
    .butler-msg strong { color: #e6edf3; font-weight: 600; }
    .butler-msg em { color: #8b949e; font-style: italic; }
    .butler-msg code { font-family: 'Consolas', 'SF Mono', monospace; font-size: 0.87em; color: #2dd4bf; background: #0d1117; padding: 1px 5px; border-radius: 3px; }
    .butler-msg br { display: block; content: ''; margin-top: 2px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .thinking .butler-msg { color: #484f58; font-style: italic; animation: pulse 1.4s ease-in-out infinite; }
    #input-bar { flex-shrink: 0; background: #161b22; border-top: 1px solid #21262d; padding: 12px 20px; }
    #input-inner { max-width: 800px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
    #input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; padding: 10px 14px; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.15s; resize: none; max-height: 150px; overflow-y: auto; line-height: 1.4; }
    #input::placeholder { color: #484f58; }
    #input:focus { border-color: #2dd4bf; }
    #send { background: #2dd4bf; color: #0d1117; border: none; border-radius: 8px; padding: 10px 22px; font-size: 0.88rem; font-weight: 700; font-family: inherit; letter-spacing: 0.5px; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
    #send:hover { background: #5eead4; }
    #send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>BUTLER</h1>
    <p>local - private - at your service, sir</p>
    <button id="mem-toggle" title="Saved memories">&#129504;</button>
  </header>

  <div id="mem-drawer">
    <h2>Saved Memories <span id="mem-close" style="float:right;cursor:pointer;color:#6e7681;">&#10005;</span></h2>
    <div id="mem-list"></div>
  </div>

  <div id="conv-wrapper">
    <div id="conversation"></div>
  </div>

  <div id="input-bar">
    <div id="input-inner">
      <textarea id="input" rows="1" placeholder="Speak to Butler..." autocomplete="off"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const wrapper   = document.getElementById('conv-wrapper');
    const conv      = document.getElementById('conversation');
    const input     = document.getElementById('input');
    const btn       = document.getElementById('send');
    const memToggle = document.getElementById('mem-toggle');
    const memDrawer = document.getElementById('mem-drawer');
    const memList   = document.getElementById('mem-list');

    function scrollToBottom() { wrapper.scrollTop = wrapper.scrollHeight; }

    function buildHistory() {
      return Array.from(conv.querySelectorAll('[data-raw]')).map(el => el.dataset.raw).join('\n');
    }

    function mdToHtml(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    async function loadMemories() {
      try {
        const r = await fetch('/memories');
        const d = await r.json();
        memList.innerHTML = '';
        if (!d.memories || d.memories.length === 0) {
          memList.innerHTML = '<div class="mem-empty">No memories stored yet.</div>';
          return;
        }
        d.memories.forEach((m, i) => {
          const item = document.createElement('div');
          item.className = 'mem-item';
          const txt = document.createElement('span');
          txt.textContent = m;
          const del = document.createElement('button');
          del.className = 'mem-del';
          del.textContent = '\u2715';
          del.title = 'Delete';
          del.addEventListener('click', async () => {
            try {
              await fetch('/delete_memory', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index: i })
              });
              loadMemories();
            } catch (e) {}
          });
          item.append(txt, del);
          memList.appendChild(item);
        });
      } catch (e) {
        memList.innerHTML = '<div class="mem-empty">Could not load memories.</div>';
      }
    }

    memToggle.addEventListener('click', () => {
      memDrawer.classList.toggle('open');
      if (memDrawer.classList.contains('open')) loadMemories();
    });
    document.getElementById('mem-close').addEventListener('click', () => {
      memDrawer.classList.remove('open');
    });

    async function send() {
      const message = input.value.trim();
      if (!message || btn.disabled) return;
      const history = buildHistory();
      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;

      const userEl = document.createElement('div');
      userEl.className = 'user-msg';
      userEl.dataset.raw = `User: ${message}`;
      userEl.textContent = message;
      conv.appendChild(userEl);

      const thinkingWrapper = document.createElement('div');
      thinkingWrapper.className = 'butler-wrapper thinking';
      const thinkingTag = document.createElement('div');
      thinkingTag.className = 'worker-tag';
      thinkingTag.textContent = '...';
      const thinkingMsg = document.createElement('div');
      thinkingMsg.className = 'butler-msg';
      thinkingMsg.textContent = 'thinking...';
      thinkingWrapper.append(thinkingTag, thinkingMsg);
      conv.appendChild(thinkingWrapper);
      scrollToBottom();

      let reply, worker, proposal;
      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history })
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        reply    = data.reply;
        worker   = data.worker;
        proposal = data.proposed_memory;
      } catch (e) {
        reply  = `(Error: ${e.message})`;
        worker = 'error';
      }

      conv.removeChild(thinkingWrapper);

      const butlerWrapper = document.createElement('div');
      butlerWrapper.className = 'butler-wrapper';
      const tag = document.createElement('div');
      tag.className = 'worker-tag';
      tag.textContent = worker;
      const butlerMsg = document.createElement('div');
      butlerMsg.className = 'butler-msg';
      butlerMsg.dataset.raw = `Butler: ${reply}`;
      butlerMsg.innerHTML = mdToHtml(reply);
      butlerWrapper.append(tag, butlerMsg);
      conv.appendChild(butlerWrapper);

      if (proposal) {
        const memEl = document.createElement('div');
        memEl.style.cssText = 'align-self:flex-start;max-width:78%;background:#161b22;border:1px solid rgba(45,212,191,0.3);border-radius:8px;padding:10px 14px;margin-top:2px;display:flex;flex-direction:column;gap:8px;';
        const memTextEl = document.createElement('div');
        memTextEl.style.cssText = 'color:#2dd4bf;font-size:0.82rem;font-style:italic;';
        memTextEl.textContent = '\u{1F4BE} Remember this? - ' + proposal;
        const btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;gap:8px;';
        const yesBtn = document.createElement('button');
        yesBtn.textContent = 'Yes';
        yesBtn.style.cssText = 'background:#2dd4bf;color:#0d1117;border:none;border-radius:6px;padding:4px 16px;font-size:0.78rem;font-weight:700;cursor:pointer;';
        const noBtn = document.createElement('button');
        noBtn.textContent = 'No';
        noBtn.style.cssText = 'background:#21262d;color:#8b949e;border:none;border-radius:6px;padding:4px 16px;font-size:0.78rem;font-weight:700;cursor:pointer;';
        yesBtn.addEventListener('click', async () => {
          yesBtn.disabled = true; noBtn.disabled = true;
          try {
            const r = await fetch('/save_memory', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ fact: proposal })
            });
            const d = await r.json();
            if (d.status === 'saved') {
              memEl.innerHTML = '';
              const saved = document.createElement('div');
              saved.style.cssText = 'color:#2dd4bf;font-size:0.82rem;';
              saved.textContent = '\u2713 Saved to memory: ' + proposal;
              memEl.appendChild(saved);
              if (memDrawer.classList.contains('open')) loadMemories();
            } else {
              memTextEl.textContent = 'Could not save.';
            }
          } catch (e) {
            memTextEl.textContent = 'Error saving: ' + e.message;
          }
        });
        noBtn.addEventListener('click', () => { conv.removeChild(memEl); });
        btnRow.append(yesBtn, noBtn);
        memEl.append(memTextEl, btnRow);
        conv.appendChild(memEl);
      }

      scrollToBottom();
      btn.disabled = false;
      input.focus();
    }

    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 150) + 'px';
    });
    input.focus();
  </script>
</body>
</html>
